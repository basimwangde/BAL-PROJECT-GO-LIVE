@if (!failed()) {
  <img
    [src]="src()"
    [alt]="alt()"
    [class]="imgClass()"
    [style.object-fit]="fit()"
    (load)="onLoad($event)"
    (error)="onError()"
    [attr.loading]="loading()"
    decoding="async"
  />
} @else {
  <div
    [class]="'branded-fallback ' + imgClass()"
    role="img"
    [attr.aria-label]="alt()"
  >
    <span class="branded-fallback__title">{{ fallbackTitle() || alt() }}</span>
    <span class="branded-fallback__sub">{{ fallbackSubtitle() }}</span>
  </div>
}

<section class="close" aria-label="Closing celebration">
  <div class="close__glow" aria-hidden="true"></div>
  <canvas #confettiCanvas class="close__confetti" aria-hidden="true"></canvas>
  <div class="close__frame">
    <div class="close__logos" aria-label="Partners">
      <div class="close__logo-slot" aria-label="Baramati Agro">
        <app-branded-image
          [src]="d.branding.logos.baramati"
          alt="Baramati Agro logo"
          imgClass="close__logo-img"
          fit="contain"
          loading="eager"
          [fallbackTitle]="d.branding.customerName"
          fallbackSubtitle="Expected: src/assets/logos/baramati-logo.png"
        />
      </div>
      <span class="close__logo-divider" aria-hidden="true"></span>
      <div class="close__logo-slot" aria-label="Percipere Consulting">
        <app-branded-image
          [src]="d.branding.logos.percipere"
          alt="Percipere Consulting logo"
          imgClass="close__logo-img"
          fit="contain"
          loading="eager"
          [fallbackTitle]="d.branding.partnerName"
          fallbackSubtitle="Expected: src/assets/logos/percipere-logo.png"
        />
      </div>
    </div>
    <div class="close__ornament" aria-hidden="true">✶</div>
    <h2 class="close__title story-display">Congratulations on {{ d.branding.projectName }}</h2>
    <div class="gold-rule close__rule"></div>
    <p class="close__line">
      A transformational journey powered by collaboration, resilience, and execution excellence.
    </p>
    <p class="close__line close__line--strong">
      With gratitude to {{ d.branding.customerName }}, {{ d.branding.partnerName }}, and every partner who
      carried the work to go-live.
    </p>
  </div>
</section>

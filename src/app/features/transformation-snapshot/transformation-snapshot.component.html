<section class="snap" aria-label="SAP S/4HANA highlights">
  @let h = d.s4HighlightsSection;
  <div class="snap__intro">
    <p class="story-kicker">{{ h.slideKicker }}</p>
    <h2 class="snap__title story-display">{{ h.title }}</h2>
    <div class="gold-rule snap__rule"></div>
    <p class="snap__lead">{{ h.lead }}</p>
  </div>

  <div class="snap__stage">
    <div class="snap__bubbles" role="list">
      @for (item of h.items; track $index) {
        <div
          class="bubble"
          role="listitem"
          [style.--bubble-delay]="($index * h.itemStaggerMs) + 'ms'"
          [class.bubble--hero]="$index === 0"
        >
          <div class="bubble__inner">
            <span class="bubble__shine" aria-hidden="true"></span>
            <span class="bubble__text">{{ item }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>

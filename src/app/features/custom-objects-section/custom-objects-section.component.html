<section class="co" aria-label="Custom object migration scale">
  <div class="co__intro">
    <p class="story-kicker">Chapter 5</p>
    <h2 class="co__title story-display">Scale of remediation</h2>
    <div class="gold-rule co__rule"></div>
    <p class="co__lead">
      A wall-sized statement of engineering volume — animated only while this chapter is on screen.
    </p>
  </div>

  <div class="co__grid">
    @for (row of d.customObjectStats; track row.label; let i = $index) {
      <article class="stat glass" [class.stat--total]="i === d.customObjectStats.length - 1">
        <div class="stat__label">{{ row.label }}</div>
        <div class="stat__value">
          <app-animated-counter
            [target]="row.value"
            [isActive]="isActive()"
            [durationMs]="i === d.customObjectStats.length - 1 ? 3200 : 2400"
          />
        </div>
      </article>
    }
  </div>
</section>
